<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rhett.photo</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Geist:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    height: 100vh;
    overflow: hidden;
    background: #0a0a0a;
    color: white;
    font-family: 'Geist', sans-serif;
  }

  #slideshow {
    position: fixed;
    inset: 0;
  }

  .slide {
    position: absolute;
    inset: 0;
    opacity: 0;
    transition: opacity 1s ease;
  }

  .slide img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    transition: transform 8s ease;
  }

  .slide.panorama img {
    object-fit: contain;
    background: black;
  }

  .slide.active {
    opacity: 1;
  }

  .slide.active img {
    transform: scale(1);
  }

  .slide::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom,
      rgba(0,0,0,0.35),
      rgba(0,0,0,0.1) 40%,
      rgba(0,0,0,0.1) 60%,
      rgba(0,0,0,0.55));
  }

  #ui {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 48px;
    z-index: 10;
  }

  .hero {
    text-align: center;
  }

  .cta-btn {
    display: inline-block;
    margin-top: 20px;
    padding: 12px 28px;
    border: 1px solid rgba(255,255,255,0.4);
    text-decoration: none;
    color: white;
  }

</style>
</head>
<body>

<div id="slideshow"></div>

<div id="ui">
  <div class="hero">
    <p>Wildlife, travel, and the quiet world in between.</p>
    <a class="cta-btn" href="gallery.html">Enter Gallery →</a>
  </div>
</div>

<script>
const albums = [
  { img: "media/small/Wildlife/cover.jpg" },
  { img: "media/small/Color/cover.jpg" },
  { img: "media/small/Panoramas/cover.jpg" },
  { img: "media/small/Travel Adventures/cover.jpg" }
];

const slideshow = document.getElementById('slideshow');
let current = 0;

const slides = albums.map((a) => {
  const slide = document.createElement('div');
  slide.className = 'slide';

  const img = document.createElement('img');
  img.src = a.img;

  img.onload = () => {
    const ratio = img.naturalWidth / img.naturalHeight;

    // panorama detection (wide images)
    if (ratio > 2) {
      slide.classList.add('panorama');
    }
  };

  slide.appendChild(img);
  slideshow.appendChild(slide);

  return slide;
});

function goTo(n) {
  slides[current].classList.remove('active');
  current = (n + slides.length) % slides.length;
  slides[current].classList.add('active');
}

function next() {
  goTo(current + 1);
}

setInterval(next, 5000);
goTo(0);
</script>

</body>
</html>
