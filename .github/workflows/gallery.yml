name: Publish Gallery
on:
  workflow_dispatch:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: write
  id-token: write
  pages: write
jobs:
  deploy:
    name: Publish Gallery to Github Pages
    if: ${{ github.repository != 'gautamkrishnar/github-pages-gallery' && github.event.head_commit.message != '' && github.event.head_commit.message != 'Initial commit' }}
    runs-on: ubuntu-latest
    env:
      NODE_PATH: /thumbsup/node_modules
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Stamp cover images 🖼️
        run: |
          sudo apt-get install -y libimage-exiftool-perl
          find gallery -iname "cover.*" -exec exiftool -overwrite_original -DateTimeOriginal="2000:01:01 00:00:00" {} \;
      - name: Build Gallery 🔧
        run: |
          docker login --username rhettus --password ${{ secrets.GH_PAT }} ghcr.io
          docker run -v "$(pwd):/work" ghcr.io/rhettus/thumbsup_website /bin/sh -c "cd /work && npm install moment && thumbsup --config /work/config.json && cp -pr /work/assets /work/build_output"
      - name: Install landing page 🏠
        run: |
          sudo chown -R $USER:$USER build_output
          mv build_output/index.html build_output/gallery.html
                    find build_output -name "*.html" -not -name "index.html" -exec sed -i 's|href="index.html"|href="gallery.html"|g' {} ;
          find build_output -name "*.html" -not -name "index.html" -exec sed -i 's|href="../index.html"|href="../gallery.html"|g' {} ;
          cp index.html build_output/index.html 
      - name: Package and upload artifact 📦
        uses: actions/upload-pages-artifact@v3
        with:
          name: github-pages  # ⚠️ GitHub Pages now requires this artifact name
          path: build_output
          retention-days: 1  # Ensures cleanup after deployment
      - name: Deploy to Github Pages 🚀
        uses: actions/deploy-pages@v4
        with:
          artifact_name: github-pages  # ⚠️ Must match upload name exactly
          token: ${{ secrets.GITHUB_TOKEN }}

