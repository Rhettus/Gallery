name: Publish Gallery
on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
permissions:
  contents: write
  id-token: write
  pages: write
jobs:
  deploy:
    name: Publish Gallery to Github Pages
    if: ${{ github.repository != 'gautamkrishnar/github-pages-gallery' && github.event.head_commit.message != '' && github.event.head_commit.message != 'Initial commit' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout 🛎️
        uses: actions/checkout@v3
        with:
          persist-credentials: false
      - name: Build Gallery 🔧
        run: docker run -v "$(pwd):/work" ghcr.io/thumbsup/thumbsup /bin/sh -c "cd /work/ && npm install moment && thumbsup --config config.json"
      - name: Package build
        uses: actions/upload-artifact@v4
        with:
          name: github-pages
          path: |
            'build_output'
            assets/
      - name: Deploy to Github Pages 🚀
        uses: actions/deploy-pages@v3
        with:
          artifact_name: github-pages
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Delete artifact 🗑️
        uses: geekyeggo/delete-artifact@v2
        with:
          name: gh-pages

